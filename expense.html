<!DOCTYPE html>
<html>
<head>
  <title>Advanced Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #eee;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .actions button {
      margin-left: 5px;
      padding: 5px;
    }

    .filter {
      display: flex;
      gap: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>💰 Advanced Expense Tracker</h2>

  <div class="card">
    <input type="text" id="title" placeholder="Expense Name">
    <input type="number" id="amount" placeholder="Amount">

    <select id="category">
      <option>Food</option>
      <option>Travel</option>
      <option>Bills</option>
      <option>Shopping</option>
    </select>

    <button onclick="addExpense()">Add / Update Expense</button>
  </div>

  <div class="card">
    <div class="filter">
      <select id="filter" onchange="displayExpenses()">
        <option>All</option>
        <option>Food</option>
        <option>Travel</option>
        <option>Bills</option>
        <option>Shopping</option>
      </select>
    </div>

    <h3>Total: ₹<span id="total">0</span></h3>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card" id="list"></div>
</div>

<script>
  let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
  let editId = null;
  let chart;

  function saveData() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
  }

  function addExpense() {
    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let category = document.getElementById("category").value;

    if (!title || !amount) {
      alert("Enter all fields");
      return;
    }

    if (editId) {
      expenses = expenses.map(exp =>
        exp.id === editId
          ? { ...exp, title, amount: +amount, category }
          : exp
      );
      editId = null;
    } else {
      expenses.push({
        id: Date.now(),
        title,
        amount: +amount,
        category
      });
    }

    saveData();
    displayExpenses();

    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
  }

  function deleteExpense(id) {
    expenses = expenses.filter(exp => exp.id !== id);
    saveData();
    displayExpenses();
  }

  function editExpense(id) {
    let exp = expenses.find(e => e.id === id);
    document.getElementById("title").value = exp.title;
    document.getElementById("amount").value = exp.amount;
    document.getElementById("category").value = exp.category;
    editId = id;
  }

  function displayExpenses() {
    let list = document.getElementById("list");
    let filter = document.getElementById("filter").value;

    list.innerHTML = "";
    let total = 0;

    let filtered = filter === "All"
      ? expenses
      : expenses.filter(e => e.category === filter);

    filtered.forEach(exp => {
      total += exp.amount;

      list.innerHTML += `
        <div class="item">
          <span>${exp.title} (${exp.category})</span>
          <span>₹${exp.amount}</span>
          <div class="actions">
            <button onclick="editExpense(${exp.id})">✏️</button>
            <button onclick="deleteExpense(${exp.id})">❌</button>
          </div>
        </div>
      `;
    });

    document.getElementById("total").innerText = total;

    updateChart();
  }

  function updateChart() {
    let dataMap = {};

    expenses.forEach(exp => {
      if (!dataMap[exp.category]) dataMap[exp.category] = 0;
      dataMap[exp.category] += exp.amount;
    });

    let labels = Object.keys(dataMap);
    let data = Object.values(dataMap);

    if (chart) chart.destroy();

    let ctx = document.getElementById("chart").getContext("2d");

    chart = new Chart(ctx, {
      type: "pie",
      data: {
        labels: labels,
        datasets: [{
          data: data
        }]
      }
    });
  }

  displayExpenses();
</script>

</body>
</html>
